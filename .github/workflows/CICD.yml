name: CICD
on:  [push]

jobs:
  Test-job:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: 01-ci-lab

    strategy:
      matrix:
        version: ["3.10", "3.11", "3.12"]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.version }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Python script
        run: pytest

      - name: Add formating
        run: flake8 .

  deploy:
    runs-on: ubuntu-latest
    needs: Test-job

    defaults:
      run:
        working-directory: 01-ci-lab

    permissions:
      id-token: write

    env:
      AWS_REGION: eu-central-1
      LAMBDA_NAME: calculator-app

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
            role-to-assume: arn:aws:iam::770762663048:role/GH_CICD
            aws-region: us-east-1

      - name: Zip Lambda function code
        run: |
          cp app/calculator.py lambda_function.py
          zip function.zip lambda_function.py

      - name: Create or update Lambda
        run: |
          if aws lambda get-function --function-name  ${{ env.LAMBDA_NAME }} >/dev/null 2>&1 ; then

            aws lambda update-function-code \
              --function-name ${{ env.LAMBDA_NAME }} \
              --zip-file fileb://function.zip
                
                echo "Lambda updated!"
          else

            aws lambda create-function \
              --function-name ${{ env.LAMBDA_NAME }} \
              --zip-file fileb://function.zip \
              --role arn:aws:iam::770762663048:role/service-role/Calculator-app-role-jip0t845 \
              --handler lambda_function.lambda_handler \
              --runtime python3.13
                echo "Lambda Created!"

          fi